<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrumSpace | Особистий кабінет</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
</head>
<body class="cabinet-page">

    <header class="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">DRUM<span>SPACE</span></a></div>

        <nav class="navbar">
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">На головну</a></li>
                <li><a href="#" class="btn-login" id="logout-btn">ВИЙТИ</a></li>
            </ul>

            <div class="burger" id="burger-menu">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </nav>
    </header>

    <main class="cabinet-grid">
        <aside class="profile-sidebar">
            <div class="profile-card">
                <div class="avatar-circle" id="user-initials">??</div>
                <h2 id="profile-name">Завантаження...</h2>
                <p id="profile-email">...</p>

                <div class="user-stats">
                    <div class="stat-box">
                        <span id="stat-total">0</span>
                        <label>Репетицій</label>
                    </div>
                    <div class="stat-box">
                        <span id="stat-next">--:--</span>
                        <label>Наступна</label>
                    </div>
                </div>
            </div>
            <div class="loyalty-card">
                <h3>Програма лояльності</h3>
                <p id="loyalty-text">Завантаження...</p>
                <div class="progress-bar">
                    <div id="loyalty-progress" class="progress-fill" style="width: 0%;"></div>
                </div>
            </div>
        </aside>

        <section class="content-area">
            <div class="tabs-header">
                <button class="tab-btn active" data-tab="calendar-view">КАЛЕНДАР</button>
                <button class="tab-btn" data-tab="list-view">СПИСОК ЗАПИСІВ</button>
            </div>

            <div id="calendar-view" class="tab-pane active">
                <div id="calendar"></div>
            </div>

            <div id="list-view" class="tab-pane">
                <table class="booking-table">
                    <thead>
                        <tr>
                            <th>Кімната</th>
                            <th>Дата та час</th>
                            <th>Дія</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-list-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-edit-modal">&times;</span>
            <h3>Перенести репетицію</h3>
            <form id="edit-form" class="form-layout">
                <input type="hidden" id="editBookingId">
                <div class="form-group">
                    <label for="editDate">Нова дата та час</label>
                    <input type="datetime-local" id="editDate" required>
                </div>
                <button type="submit" class="btn-primary">Зберегти новий час</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('userId');
            const userName = localStorage.getItem('userName');
            const token = localStorage.getItem('token'); // ДІСТАЄМО НАШУ ПЕРЕПУСТКУ

            // Якщо токена немає — викидаємо на головну
            if (!userId || !token) {
                window.location.href = 'index.html';
                return;
            }

            // Налаштування профілю (ім'я та ініціали беремо з пам'яті)
            document.getElementById('profile-name').innerText = userName;
            document.getElementById('user-initials').innerText = userName.substring(0, 2).toUpperCase();

            // Логіка для мобільного бургер-меню
            const burger = document.getElementById('burger-menu');
            const navLinks = document.getElementById('nav-links');
            if (burger && navLinks) {
                burger.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }

            // --- НОВЕ: БЕЗПЕЧНО ОТРИМУЄМО ПРОФІЛЬ (LAB 3) ---
            async function fetchProfile() {
                try {
                    const response = await fetch('http://localhost:3000/profile', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}` // Показуємо перепустку
                        }
                    });

                    if (!response.ok) {
                        // Якщо токен прострочився
                        throw new Error('Токен недійсний');
                    }

                    const data = await response.json();
                    document.getElementById('profile-email').innerText = data.user.email;
                } catch (error) {
                    console.error('Помилка авторизації:', error);
                    alert('Ваша сесія закінчилася. Будь ласка, увійдіть знову.');
                    localStorage.clear();
                    window.location.href = 'index.html';
                }
            }

            // 1. Отримуємо бронювання з сервера (додаємо токен для безпеки)
            async function fetchBookings() {
                try {
                    const response = await fetch(`http://localhost:3000/users/${userId}/bookings`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const bookings = await response.json();

                    updateStats(bookings);
                    renderCalendar(bookings);
                    renderTable(bookings);
                } catch (error) {
                    console.error("Помилка завантаження бронювань", error);
                }
            }

            // 2. Статистика
            function updateStats(bookings) {
                const count = bookings.length;
                document.getElementById('stat-total').innerText = count;

                // --- ЛОГІКА ПРОГРАМИ ЛОЯЛЬНОСТІ ---
                const goal = 5;
                const remaining = goal - (count % goal);
                const progressPercent = ((count % goal) / goal) * 100;

                const loyaltyText = document.getElementById('loyalty-text');
                const loyaltyProgress = document.getElementById('loyalty-progress');

                if (count > 0 && count % goal === 0) {
                    loyaltyText.innerHTML = "<strong>Вітаємо!</strong> Ви отримали знижку 10% на наступну гру!";
                    loyaltyProgress.style.width = "100%";
                    loyaltyProgress.style.background = "#28a745";
                } else {
                    loyaltyText.innerText = `Зроби ще ${remaining} репетиції для знижки 10%`;
                    loyaltyProgress.style.width = `${progressPercent}%`;
                    loyaltyProgress.style.background = "#e50914";
                }

                if (count > 0) {
                    const next = bookings[0].content.split(': ')[1] || '--:--';
                    document.getElementById('stat-next').innerText = next.substring(5, 10);
                }
            }

            // 3. Календар
            function renderCalendar(bookings) {
                const events = bookings.map(b => {
                    const fullDateString = b.content.replace('Дата репетиції: ', '');
                    const timeOnly = fullDateString.split('T')[1] || '';

                    return {
                        title: timeOnly,
                        start: fullDateString,
                        backgroundColor: '#e50914',
                        borderColor: '#e50914'
                    }
                });

                const calendarEl = document.getElementById('calendar');
                calendarEl.innerHTML = '';
                const calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'uk',
                    themeSystem: 'standard',
                    events: events,
                    height: 'auto',
                    displayEventTime: false
                });
                calendar.render();
            }

            // 4. Таблиця з можливістю видалення та редагування
            function renderTable(bookings) {
                const tbody = document.getElementById('bookings-list-body');
                tbody.innerHTML = bookings.map(b => {
                    const pureDate = b.content.replace('Дата репетиції: ', '');

                    return `
                    <tr>
                        <td><strong>${b.roomName}</strong></td>
                        <td>${pureDate.replace('T', ' ')}</td>
                        <td style="display: flex; gap: 10px;">
                            <button class="btn-edit" onclick="openEditModal(${b.id}, '${pureDate}')">Змінити час</button>
                            <button class="btn-delete" onclick="deleteBooking(${b.id})">Скасувати</button>
                        </td>
                    </tr>
                `}).join('');
            }

            // 5. Перемикач табів
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                    if (btn.dataset.tab === 'calendar-view') window.dispatchEvent(new Event('resize'));
                });
            });

            // 6. Вихід (НОВЕ: Викликаємо бекенд Logout з LAB 3)
            document.getElementById('logout-btn').addEventListener('click', async (e) => {
                e.preventDefault();
                try {
                    // Повідомляємо сервер про вихід
                    await fetch('http://localhost:3000/logout', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch (err) {
                    console.log('Помилка при виході на сервері', err);
                }

                // Видаляємо всі дані з фронтенду
                localStorage.clear();
                window.location.href = 'index.html';
            });

            // Запускаємо завантаження даних
            fetchProfile();
            fetchBookings();
        });

        // Функція видалення (Додаємо токен)
        async function deleteBooking(id) {
            if (confirm('Ви впевнені, що хочете скасувати це бронювання?')) {
                const token = localStorage.getItem('token');
                try {
                    const response = await fetch(`http://localhost:3000/bookings/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        location.reload();
                    }
                } catch (err) {
                    alert('Помилка при видаленні');
                }
            }
        }

        // --- ЛОГІКА РЕДАГУВАННЯ (UPDATE) ---
        const editModal = document.getElementById('edit-modal');
        const editForm = document.getElementById('edit-form');

        window.openEditModal = function(id, currentDate) {
            document.getElementById('editBookingId').value = id;
            document.getElementById('editDate').value = currentDate;
            editModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        };

        document.getElementById('close-edit-modal').addEventListener('click', () => {
            editModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        });

        // Відправка нових даних на сервер (Додаємо токен)
        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editBookingId').value;
            const newDate = document.getElementById('editDate').value;
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`http://localhost:3000/bookings/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ date: newDate })
                });

                if (response.ok) {
                    alert('Час репетиції успішно оновлено!');
                    location.reload();
                } else {
                    alert('Помилка при оновленні.');
                }
            } catch (err) {
                console.error('Помилка:', err);
                alert('Немає зв’язку з сервером.');
            }
        });

    </script>
</body>
</html>
